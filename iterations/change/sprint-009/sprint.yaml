    rationale: "微信小程序商品卡片组件：作为 REQ-0047 商品列表通用组件的子需求，聚焦单个卡片展示、图片占位、点击跳转、异常状态和埋点建议；默认不新增 API/DB，需先 /req-opsx 创建 OpenSpec Change。"
  - id: REQ-0050-miniapp-brand-header-page-title-rules
    change:
    size: S
    story_points: 1
    estimated_person_days: 1.0
    rationale: "小程序 brand-header 页面标题规则：作为 REQ-0048 全局自定义导航栏的 refinement，聚焦首页两行文案、非首页单行标题、返回按钮、状态栏和微信原生胶囊避让；默认不新增 API/DB，需先 /req-opsx 创建 OpenSpec Change。"
  - id: BUG-0066-search-component-prototype-deviation
    change:
    size: M
    story_points: 3
    estimated_person_days: 3.0
    rationale: "搜索组件原型偏差修复：需对齐 REQ-0046 的 5 个搜索状态原型，涉及小程序搜索页 WXML/WXSS/TS、通用搜索组件应用、综合分区、筛选价格区间、无结果状态和静态验收测试；默认不新增 API/DB。"
  - id: REQ-0051-category-list-product-list-entry-by-level
    change:
    size: M
    story_points: 3
    estimated_person_days: 3.0
    rationale: "分类列表页支持一二级分类商品列表入口：涉及小程序分类页一级聚合入口、二级精确入口参数、商品列表 categoryLevel 上下文、空状态/埋点，以及可能的后端一级分类子分类聚合查询语义；需先 /req-opsx 创建 OpenSpec Change。"
  - id: BUG-0067-home-recommendation-list-entry-routing
    change:
    size: S
    story_points: 1
    estimated_person_days: 1.0
    rationale: "首页推荐模块查看更多和榜单入口误跳搜索页修复：聚焦微信小程序首页新品榜、热销榜、新品推荐查看更多、热销推荐查看更多 4 个入口路由，需同步 .ts/.js 与静态测试；默认不新增 API/DB。"

