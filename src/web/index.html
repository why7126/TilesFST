<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="64x64" href="/logos/64x64.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/logos/128x128.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/logos/256x256.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <title>TilesFST</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const key = 'tilesfst.theme_mode';
        const modes = new Set(['system', 'dark_flagship', 'comfort_dark', 'light']);
        const stored = window.localStorage.getItem(key);
        const mode = modes.has(stored) ? stored : 'system';
        const prefersLight = window.matchMedia?.('(prefers-color-scheme: light)').matches ?? false;
        const resolved = mode === 'light' || (mode === 'system' && prefersLight) ? 'light' : 'dark';
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.classList.toggle('light', resolved === 'light');
        document.documentElement.classList.toggle('dark', resolved === 'dark');
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
