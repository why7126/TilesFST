schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

context: |
  项目语言与文档约定：
  - OpenSpec 的 proposal、design、tasks、specs 默认使用中文编写。
  - 面向用户、产品、接口契约和验收标准的描述必须使用中文。
  - 代码标识符、文件名、API path、数据库字段名、环境变量名可以使用英文。
  - 需求描述优先说明用户可观察行为，不要只描述内部实现细节。
  - 对外行为、兼容性、权限、安全、错误处理和边界条件必须明确写入规格。

  技术栈：
  - 后端：Python。
  - 前端：TypeScript。
  - 关系数据库：SQLite。
  - 对象存储：MinIO。
  - MinIO 使用已经部署好的现有服务，本项目不负责单独部署 MinIO 服务。
  - 后端通过配置连接外部 MinIO 服务，不在本项目中启动、编排或初始化 MinIO 容器。
  - 项目应尽量保持本地开发、测试环境和生产环境配置方式一致，通过环境变量或配置文件切换。

  后端约定：
  - 后端代码使用 Python 编写。
  - 新增后端能力时，应优先保持清晰的分层边界：
    - API / 路由层：处理请求、鉴权、参数解析和响应格式。
    - Service / Use Case 层：承载业务流程和业务规则。
    - Repository / DAO 层：封装 SQLite 数据访问。
    - Storage / Object Store 层：封装 MinIO 对象读写。
  - 不要在 API 层直接编写复杂业务逻辑。
  - 不要在业务层散落 MinIO SDK 细节，应通过统一的对象存储接口调用。
  - 所有外部依赖，包括 SQLite 路径、MinIO endpoint、bucket、access key、secret key、region、secure 配置，都必须可配置。
  - 敏感信息不得硬编码到代码、测试 fixture、OpenSpec 文档或提交记录中。
  - 后端错误响应应保持结构化，至少包含错误码、错误信息和必要的上下文。
  - 涉及文件、对象、任务或长耗时操作时，应定义失败重试、幂等性和清理策略。

  前端约定：
  - 前端代码使用 TypeScript 编写。
  - 新增页面、组件、状态管理、API client 时必须保持类型安全。
  - 与后端交互的数据结构应定义 TypeScript 类型或接口。
  - 不要在多个组件中重复拼接 API 请求路径或重复定义响应结构。
  - 用户可见文案默认使用中文。
  - 表单、上传、下载、错误提示、空状态、加载状态和权限不足状态都应有明确交互。
  - 前端不得直接访问 MinIO 私有凭证。
  - 如需要上传或下载对象，应通过后端生成受控接口、预签名 URL 或其他受控机制完成。

  SQLite 约定：
  - SQLite 是项目默认关系数据库。
  - 规格中涉及数据持久化时，应说明表、字段、索引、唯一约束、外键或软删除策略。
  - 设计中必须说明迁移策略，包括新增字段默认值、兼容旧数据、回滚影响。
  - 业务逻辑不得依赖 SQLite 之外的关系数据库特性，除非明确说明兼容性限制。
  - 并发写入、事务边界、唯一约束冲突和数据一致性必须在设计或规格中说明。
  - 测试应覆盖空数据库、已有数据、重复写入、约束冲突和迁移后的兼容行为。

  MinIO 约定：
  - MinIO 作为对象存储使用，兼容 S3 风格对象操作。
  - 本项目只消费已部署的 MinIO 服务，不创建、不安装、不编排、不升级 MinIO。
  - 所有 bucket、prefix、对象 key 生成规则、content-type、大小限制、生命周期规则依赖都必须在设计中说明。
  - 对象 key 生成必须避免泄露用户隐私、原始本地路径或敏感业务信息。
  - 上传流程必须定义：
    - 允许的文件类型或对象类型。
    - 最大对象大小。
    - 是否校验内容哈希。
    - 上传失败后的清理策略。
    - 数据库记录与对象存储之间的一致性策略。
  - 下载或访问流程必须定义：
    - 权限校验方式。
    - URL 有效期或访问控制策略。
    - 对不存在对象、无权限对象、过期链接的处理。
  - 删除流程必须定义：
    - 是否硬删除对象。
    - 是否保留数据库审计记录。
    - 数据库删除成功但对象删除失败时的补偿策略。
  - 测试中不要依赖真实生产 MinIO；应使用 mock、测试 bucket、测试实例或可替换的对象存储接口。
  - 文档和任务中不得要求“部署 MinIO”，除非明确是外部基础设施团队的前置条件。

  API 与契约约定：
  - 新增或修改接口时必须说明请求方法、路径、请求参数、响应结构、错误码和权限要求。
  - API 行为应以后端契约为准，前端只消费明确约定的字段。
  - 涉及分页、排序、过滤、搜索时，应说明默认值、最大值和非法参数行为。
  - 涉及上传、下载、导入、导出时，应说明文件大小、格式、超时、失败重试和用户提示。
  - 向后兼容性优先。破坏性变更必须在 proposal 和 design 中显式标记，并给出迁移方案。

  安全与权限约定：
  - 所有涉及用户数据、文件对象、业务记录的操作都必须进行权限校验。
  - 不允许前端持有 MinIO access key 或 secret key。
  - 不允许通过对象 key 猜测访问其他用户或租户的数据。
  - 错误信息不得泄露内部路径、MinIO 凭据、数据库路径、堆栈细节或敏感字段。
  - 涉及鉴权、授权、文件访问、对象删除、批量操作时，必须补充安全场景。

  测试约定：
  - 每个 OpenSpec requirement 至少应有对应测试任务。
  - 后端测试应覆盖 service 层、repository 层、对象存储适配层和关键 API 行为。
  - 前端测试应覆盖关键交互、表单校验、API 错误、加载状态和权限不足状态。
  - 涉及 SQLite 的测试应使用隔离的临时数据库或测试数据库文件。
  - 涉及 MinIO 的测试应通过 mock、fake storage、测试 bucket 或可配置 endpoint 隔离。
  - 测试不得依赖生产 MinIO、生产 bucket 或真实敏感凭证。

  配置与部署约定：
  - 应通过环境变量或配置文件注入运行时配置。
  - 推荐的配置项包括：
    - DATABASE_URL 或 SQLITE_PATH
    - MINIO_ENDPOINT
    - MINIO_BUCKET
    - MINIO_ACCESS_KEY
    - MINIO_SECRET_KEY
    - MINIO_REGION
    - MINIO_SECURE
    - MINIO_PUBLIC_BASE_URL 或对象访问基准地址，如适用
  - 配置缺失时，应用应给出清晰错误，而不是静默失败。
  - 本项目不生成 MinIO 部署清单、不新增 MinIO docker-compose 服务、不创建 MinIO Helm chart。
  - 如需要说明部署前置条件，只写“需要可访问的已部署 MinIO 服务”。

rules:
  proposal:
    - 使用中文编写 proposal。
    - 明确说明变更背景、目标、非目标、用户价值和受影响范围。
    - 明确列出后端 Python、前端 TypeScript、SQLite、MinIO 相关影响。
    - 如果涉及对象存储，必须声明“使用已部署的 MinIO 服务，本项目不单独部署 MinIO”。
    - 明确列出不做的事情，尤其是不部署 MinIO、不硬编码凭证、不绕过后端直接让前端访问 MinIO 私有凭证。
    - 识别兼容性风险、数据迁移风险、对象存储一致性风险和权限风险。
    - 包含回滚方案，说明代码回滚、数据库迁移回滚、对象数据清理或保留策略。
    - 对不确定事项使用“待确认问题”列出，不要在缺少信息时擅自假设关键业务规则。

  specs:
    - 使用中文编写规格。
    - Requirement 必须描述用户可观察行为或系统对外契约。
    - 每个 Requirement 必须包含 Given / When / Then 场景。
    - 场景必须覆盖成功路径、失败路径、权限不足、非法输入、空数据和边界条件。
    - 涉及前端交互时，必须描述用户看到的状态、提示、按钮可用性和错误反馈。
    - 涉及后端 API 时，必须描述请求、响应、错误码和权限要求。
    - 涉及 SQLite 时，必须描述数据持久化结果、唯一性、事务一致性或迁移后的行为。
    - 涉及 MinIO 时，必须描述对象上传、读取、删除、权限校验、对象不存在和存储失败场景。
    - 不要把纯实现步骤写成 Requirement；实现细节应放在 design.md 或 tasks.md。
    - 如果行为依赖外部已部署 MinIO 服务，规格必须描述服务不可用、凭证错误或 bucket 不存在时的用户可见结果。
    - 修改既有行为时必须使用 MODIFIED requirements，并明确旧行为和新行为差异。
    - 删除行为时必须使用 REMOVED requirements，并说明用户或系统不再支持的能力。

  design:
    - 使用中文编写 design。
    - 设计必须说明后端 Python 分层、前端 TypeScript 结构、SQLite 数据模型和 MinIO 对象存储交互。
    - 说明关键技术决策、备选方案、取舍理由和拒绝的方案。
    - 涉及数据库时，必须包含表结构、字段、索引、迁移、事务边界和回滚影响。
    - 涉及 MinIO 时，必须包含 bucket、prefix、object key 规则、权限模型、失败补偿和清理策略。
    - 明确说明本项目不部署 MinIO，只连接已部署服务。
    - 明确配置项来源，禁止硬编码 MinIO endpoint、access key、secret key、bucket 和 SQLite 路径。
    - 说明前端如何调用后端接口，前端不得直接使用 MinIO 私有凭证。
    - 说明错误处理策略，包括数据库失败、对象存储失败、网络超时、权限不足和部分成功。
    - 说明安全考虑，包括鉴权、授权、敏感信息保护、对象 key 防猜测和日志脱敏。
    - 说明测试策略，包括单元测试、集成测试、前端测试、SQLite 测试和 MinIO mock/测试实例策略。
    - 如存在性能、并发或一致性问题，必须明确限制、缓解方案和后续演进方向。

  tasks:
    - 使用中文编写 tasks。
    - 任务必须是可执行 checklist，每项任务应能被开发者或 AI 编码助手独立完成和验证。
    - 按建议顺序组织任务：规格确认、数据模型、后端接口、对象存储适配、前端交互、测试、文档、验证。
    - 后端任务必须明确涉及的 Python 模块、服务层、数据访问层、对象存储层和 API 层。
    - 前端任务必须明确涉及的 TypeScript 类型、API client、页面或组件、状态和错误提示。
    - SQLite 相关任务必须包含迁移、索引、约束、事务和测试数据。
    - MinIO 相关任务必须包含配置读取、连接校验、bucket/prefix 使用、上传/读取/删除、失败处理和 mock 测试。
    - 不得添加“部署 MinIO”任务；只能添加“配置连接已部署 MinIO 服务”或“验证已部署 MinIO 可访问”任务。
    - 每个 Requirement 的 Given / When / Then 场景都必须能在 tasks 中找到对应测试任务。
    - 包含运行验证任务，例如类型检查、单元测试、集成测试、前端构建和关键手工验收。
    - 如果有迁移或数据清理，必须包含回滚或补偿任务。
    - 完成实现后应更新 tasks.md 勾选状态，并记录任何偏离 design.md 的地方。