<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TILESFST — 管理端侧边栏展开态（REQ-0011）</title>
  <style>
    :root {
      --page: #18160f;
      --deep: #100f0a;
      --text: #ede8df;
      --muted: rgb(237 232 223 / 0.5);
      --weak: rgb(237 232 223 / 0.3);
      --gold: #c8a055;
      --gold-bg: rgb(200 160 85 / 0.12);
      --line: rgb(255 255 255 / 0.07);
      --line-strong: rgb(255 255 255 / 0.1);
      --sidebar-width: 264px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--page);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .admin-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      background:
        radial-gradient(circle at 88% 8%, rgb(200 160 85 / 0.08), transparent 24%),
        linear-gradient(135deg, var(--page), var(--deep));
    }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px 18px;
      border-right: 0.5px solid var(--line);
      background:
        radial-gradient(circle at 20% 8%, rgb(200 160 85 / 0.1), transparent 30%),
        linear-gradient(180deg, rgb(255 255 255 / 0.025), transparent 28%),
        rgb(16 15 10 / 0.76);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      padding: 0 6px 20px;
      border-bottom: 0.5px solid var(--line);
      margin-bottom: 18px;
    }
    .brand-block { min-width: 0; }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .brand-name {
      color: var(--gold);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 20px;
      letter-spacing: 0.16em;
    }
    .version-pill {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 7px;
      border: 0.5px solid var(--line-strong);
      border-radius: 2px;
      font-size: 10px;
      color: var(--muted);
    }
    .brand-sub {
      margin: 8px 0 0;
      font-size: 11px;
      color: var(--weak);
    }
    .sidebar-toggle {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: 0.5px solid var(--line-strong);
      border-radius: 2px;
      background: rgb(255 255 255 / 0.03);
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .sidebar-toggle:hover { color: var(--text); border-color: var(--line-strong); }
    .nav-scroll { flex: 1; min-height: 0; overflow: auto; }
    .nav-section { margin-bottom: 22px; }
    .nav-title {
      padding: 0 10px;
      margin: 0 0 8px;
      color: var(--weak);
      font-size: 10px;
      letter-spacing: 0.18em;
    }
    .nav-item {
      height: 40px;
      margin-bottom: 4px;
      padding: 0 12px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      border: 0.5px solid transparent;
      position: relative;
      text-decoration: none;
    }
    .nav-item.active {
      color: var(--gold);
      background: var(--gold-bg);
      border-color: rgb(200 160 85 / 0.26);
    }
    .nav-item.active::before {
      content: "";
      width: 2px;
      height: 16px;
      background: var(--gold);
      border-radius: 2px;
      position: absolute;
      left: 0;
    }
    .nav-icon {
      width: 16px;
      height: 16px;
      border: 0.5px solid currentColor;
      border-radius: 2px;
      opacity: 0.72;
      flex-shrink: 0;
    }
    .sidebar-user {
      margin-top: auto;
      padding-top: 16px;
      border-top: 0.5px solid var(--line);
    }
    .user-trigger {
      width: 100%;
      min-height: 56px;
      padding: 10px;
      display: grid;
      grid-template-columns: 34px 1fr 14px;
      gap: 10px;
      align-items: center;
      border: 0.5px solid transparent;
      border-radius: 3px;
      background: transparent;
      color: inherit;
      text-align: left;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 3px;
      background: var(--gold-bg);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border: 0.5px solid rgb(200 160 85 / 0.32);
    }
    .user-name { display: block; font-size: 12px; }
    .user-email { display: block; margin-top: 3px; font-size: 11px; color: var(--weak); }
    .user-chevron { color: var(--weak); }
    .main-content {
      min-width: 0;
      height: 100vh;
      padding: 44px 56px;
      overflow: auto;
    }
    .proto-note {
      max-width: 720px;
      padding: 14px 16px;
      border: 0.5px solid var(--line);
      border-radius: 3px;
      background: rgb(33 30 22 / 0.72);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }
    .proto-note a { color: var(--gold); }
    h1 { font-size: 24px; font-weight: 400; margin: 18px 0 8px; }
    p.lead { color: var(--weak); font-size: 13px; margin: 0; }
  </style>
</head>
<body>
  <div class="admin-shell" data-sidebar-state="expanded">
    <aside class="sidebar" aria-label="后台导航">
      <div class="sidebar-head">
        <div class="brand-block">
          <div class="brand-row">
            <span class="brand-name">TILESFST</span>
            <span class="version-pill">v0.0.1</span>
          </div>
          <p class="brand-sub">瓷砖信息管理平台</p>
        </div>
        <a class="sidebar-toggle" href="admin-sidebar-collapsed.html" aria-label="收起侧边栏" title="收起侧边栏">‹</a>
      </div>
      <div class="nav-scroll">
        <nav class="nav-section" aria-label="Operations">
          <p class="nav-title">OPERATIONS</p>
          <a class="nav-item" href="#"><span class="nav-icon"></span>首页</a>
          <a class="nav-item active" href="#"><span class="nav-icon"></span>瓷砖品牌</a>
          <a class="nav-item" href="#"><span class="nav-icon"></span>瓷砖 SKU</a>
          <a class="nav-item" href="#"><span class="nav-icon"></span>瓷砖类目</a>
        </nav>
        <nav class="nav-section" aria-label="System">
          <p class="nav-title">SYSTEM</p>
          <a class="nav-item" href="#"><span class="nav-icon"></span>用户管理</a>
          <a class="nav-item" href="#"><span class="nav-icon"></span>系统设置</a>
        </nav>
      </div>
      <div class="sidebar-user">
        <button class="user-trigger" type="button">
          <span class="avatar">AU</span>
          <span>
            <span class="user-name">Admin User</span>
            <span class="user-email">admin@tilesfst.com</span>
          </span>
          <span class="user-chevron">⌃</span>
        </button>
      </div>
    </aside>
    <main class="main-content">
      <div class="proto-note">
        REQ-0011 原型 — <strong>展开态</strong>（264px）。Chevron 位于头部右上角。点击 ‹ 跳转至
        <a href="admin-sidebar-collapsed.html">收起态原型</a>。Golden PNG 待导出至 <code>images/admin-sidebar-expanded.png</code>。
      </div>
      <h1>瓷砖品牌</h1>
      <p class="lead">主内容区随侧栏 264px 列宽布局；实现时使用 CSS 变量 <code>--admin-sidebar-width</code> 与 transition。</p>
    </main>
  </div>
</body>
</html>
