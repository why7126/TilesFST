<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REQ-0056 商品列表双列卡片原型</title>
  <style>
    :root {
      --page: #18160F;
      --surface: #211E16;
      --surface-2: #2A261D;
      --text: #EDE8DF;
      --muted: rgba(237, 232, 223, 0.58);
      --line: rgba(255, 255, 255, 0.08);
      --gold: #C8A055;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0d09;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .phone {
      width: min(390px, 100vw);
      min-height: 844px;
      background: var(--page);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .nav {
      height: 88px;
      padding: 48px 18px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(24, 22, 15, 0.96);
      border-bottom: 1px solid var(--line);
    }

    .back {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      color: var(--gold);
      border: 1px solid rgba(200, 160, 85, 0.28);
    }

    .nav-title {
      font-size: 17px;
      font-weight: 700;
    }

    .content {
      padding: 18px 14px 92px;
    }

    .heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 24px;
      line-height: 1.2;
      font-weight: 800;
    }

    .summary {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      min-width: 0;
      overflow: hidden;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .image {
      position: relative;
      aspect-ratio: 1 / 0.86;
      background:
        linear-gradient(135deg, rgba(200, 160, 85, 0.2), transparent 44%),
        linear-gradient(160deg, #59544b, #1a1812);
    }

    .image.alt {
      background:
        linear-gradient(145deg, rgba(237, 232, 223, 0.22), transparent 42%),
        linear-gradient(160deg, #756858, #201c13);
    }

    .badge {
      position: absolute;
      left: 8px;
      top: 8px;
      max-width: 70px;
      padding: 3px 7px;
      border-radius: 2px;
      background: rgba(24, 22, 15, 0.72);
      border: 1px solid rgba(200, 160, 85, 0.32);
      color: var(--gold);
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy {
      padding: 10px;
    }

    .name {
      min-height: 40px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.42;
      font-weight: 800;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .price {
      margin-top: 8px;
      color: var(--gold);
      font-size: 14px;
      font-weight: 800;
    }

    .load-more {
      min-height: 54px;
      display: grid;
      place-items: center;
      color: rgba(237, 232, 223, 0.45);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="商品列表双列卡片原型">
    <header class="nav">
      <div class="back">‹</div>
      <div class="nav-title">热销榜</div>
    </header>
    <section class="content">
      <div class="heading">
        <div class="title">热销推荐</div>
        <div class="summary">共 48 款</div>
      </div>

      <div class="grid">
        <article class="card">
          <div class="image"><span class="badge">热销</span></div>
          <div class="copy">
            <div class="name">云岩柔光大板瓷砖</div>
            <div class="meta">菲尚特 · 750×1500</div>
            <div class="price">¥128 / 片</div>
          </div>
        </article>
        <article class="card">
          <div class="image alt"><span class="badge">新品</span></div>
          <div class="copy">
            <div class="name">米兰石纹客厅地砖</div>
            <div class="meta">菲尚特 · 800×800</div>
            <div class="price">¥89 / 片</div>
          </div>
        </article>
        <article class="card">
          <div class="image alt"><span class="badge">热销</span></div>
          <div class="copy">
            <div class="name">暮色砂岩防滑砖</div>
            <div class="meta">厨卫 · 600×1200</div>
            <div class="price">¥106 / 片</div>
          </div>
        </article>
        <article class="card">
          <div class="image"><span class="badge">推荐</span></div>
          <div class="copy">
            <div class="name">星河灰通体大理石瓷砖</div>
            <div class="meta">客厅 · 900×1800</div>
            <div class="price">¥168 / 片</div>
          </div>
        </article>
      </div>

      <div class="load-more">上拉加载更多</div>
    </section>
  </main>
</body>
</html>
