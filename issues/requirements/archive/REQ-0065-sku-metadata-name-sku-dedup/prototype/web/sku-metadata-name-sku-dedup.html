<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>REQ-0065 SKU 元数据名称与编码展示去重</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-page: #18160f;
        --bg-surface: #211e16;
        --bg-deep: #100f0a;
        --text-primary: #ede8df;
        --text-secondary: rgba(237, 232, 223, 0.62);
        --text-muted: rgba(237, 232, 223, 0.42);
        --brand-gold: #c8a055;
        --border-default: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(255, 255, 255, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg-page);
        color: var(--text-primary);
        font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 264px 1fr;
      }

      .sidebar {
        background: var(--bg-deep);
        border-right: 1px solid var(--border-default);
        padding: 28px 20px;
      }

      .brand {
        color: var(--brand-gold);
        font-size: 18px;
        letter-spacing: 0.16em;
        margin-bottom: 36px;
      }

      .nav-item {
        padding: 12px 14px;
        border: 1px solid transparent;
        color: var(--text-secondary);
      }

      .nav-item.active {
        border-color: rgba(200, 160, 85, 0.38);
        color: var(--text-primary);
        background: rgba(200, 160, 85, 0.08);
      }

      .content {
        padding: 28px;
      }

      .page-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 400;
      }

      .desc {
        margin: 0;
        color: var(--text-secondary);
        font-size: 13px;
      }

      .button {
        border: 0;
        background: var(--brand-gold);
        color: var(--bg-deep);
        padding: 10px 16px;
        font-weight: 600;
        border-radius: 2px;
      }

      .toolbar,
      .table-card,
      .modal-card {
        background: var(--bg-surface);
        border: 1px solid var(--border-default);
        border-radius: 3px;
      }

      .toolbar {
        padding: 16px;
        display: grid;
        grid-template-columns: minmax(260px, 380px) 160px 160px auto;
        gap: 12px;
        margin-bottom: 16px;
      }

      .input,
      .select {
        width: 100%;
        height: 38px;
        border: 1px solid var(--border-default);
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-primary);
        padding: 0 12px;
      }

      .table-card {
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-default);
        text-align: left;
        font-size: 13px;
      }

      th {
        color: var(--text-muted);
        font-weight: 500;
      }

      .sku-title {
        display: block;
        color: var(--text-primary);
        font-size: 14px;
      }

      .sku-code {
        display: block;
        margin-top: 4px;
        color: var(--text-muted);
        font-size: 12px;
      }

      .page-bar {
        display: flex;
        justify-content: space-between;
        padding: 14px 16px;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .modal-preview {
        margin-top: 28px;
        max-width: 880px;
      }

      .modal-card {
        padding: 20px;
      }

      .modal-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .hint {
        margin-top: 8px;
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">TILESFST</div>
        <div class="nav-item">首页</div>
        <div class="nav-item active">瓷砖 SKU</div>
        <div class="nav-item">品牌管理</div>
        <div class="nav-item">类目管理</div>
      </aside>

      <section class="content">
        <header class="page-head">
          <div>
            <h1>瓷砖 SKU</h1>
            <p class="desc">商品名称面向用户展示，SKU 编码由系统生成并用于内部识别。</p>
          </div>
          <button class="button">新增 SKU</button>
        </header>

        <section class="toolbar">
          <input class="input" placeholder="商品名称 / SKU 编码" />
          <select class="select"><option>全部品牌</option></select>
          <select class="select"><option>全部状态</option></select>
          <button class="button">查询</button>
        </section>

        <section class="table-card">
          <table>
            <thead>
              <tr>
                <th>商品信息</th>
                <th>品牌 / 类目</th>
                <th>规格 / 工艺</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>
                  <span class="sku-title">鱼肚白柔光砖 600x1200</span>
                  <span class="sku-code">内部编码：SKU-20260721-0001</span>
                </td>
                <td>菲尚特 / 大理石砖</td>
                <td>600x1200mm / 柔光</td>
                <td>草稿</td>
                <td>编辑 · 上架 · 删除</td>
              </tr>
            </tbody>
          </table>
          <div class="page-bar">
            <span class="page-summary">共 1 条</span>
            <span class="page-right">上一页 1 下一页　每页 20 条</span>
          </div>
        </section>

        <section class="modal-preview">
          <div class="modal-card">
            <h2>新增 SKU</h2>
            <p class="desc">运营填写商品名称；SKU 编码保存时自动生成。</p>
            <div class="modal-grid">
              <div>
                <label>商品名称 *</label>
                <input class="input" value="鱼肚白柔光砖 600x1200" />
              </div>
              <div>
                <label>SKU 编码</label>
                <input class="input" value="保存后系统自动生成" disabled />
                <div class="hint">内部唯一识别字段，不展示给小程序/店主端用户。</div>
              </div>
              <div>
                <label>品牌 *</label>
                <select class="select"><option>菲尚特</option></select>
              </div>
              <div>
                <label>类目 *</label>
                <select class="select"><option>大理石砖</option></select>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
