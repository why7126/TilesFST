<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>REQ-0047 商品列表页通用组件原型</title>
    <style>
      :root {
        color-scheme: dark;
        --page: #18160f;
        --surface: #211e16;
        --surface-2: #2b261b;
        --gold: #c8a055;
        --text: #ede8df;
        --muted: rgba(237, 232, 223, 0.56);
        --line: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .phone {
        width: min(390px, 100vw);
        min-height: 100vh;
        margin: 0 auto;
        background: var(--page);
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 2;
        padding: 18px 18px 12px;
        background: rgba(24, 22, 15, 0.96);
        border-bottom: 1px solid var(--line);
      }

      .topline {
        display: grid;
        grid-template-columns: 44px 1fr 44px;
        align-items: center;
        min-height: 44px;
      }

      .icon-btn {
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 22px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 500;
        text-align: center;
      }

      .summary {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
        background: var(--page);
      }

      .tool {
        min-height: 40px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 3px;
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
      }

      .tool.primary {
        border-color: rgba(200, 160, 85, 0.6);
        color: var(--gold);
      }

      .chips {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 0 18px 14px;
      }

      .chip {
        flex: 0 0 auto;
        padding: 6px 9px;
        border: 1px solid rgba(200, 160, 85, 0.45);
        border-radius: 2px;
        color: var(--gold);
        font-size: 11px;
      }

      .list {
        display: grid;
        gap: 12px;
        padding: 14px 18px 26px;
      }

      .card {
        display: grid;
        grid-template-columns: 112px 1fr;
        gap: 12px;
        min-height: 126px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--surface);
      }

      .image {
        aspect-ratio: 1 / 1;
        border-radius: 3px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.16), transparent 34%),
          linear-gradient(160deg, #756f63, #2b261b 58%, #0f0e0a);
      }

      .info {
        min-width: 0;
      }

      .badge {
        display: inline-block;
        margin-bottom: 7px;
        padding: 3px 6px;
        border: 1px solid rgba(200, 160, 85, 0.45);
        border-radius: 2px;
        color: var(--gold);
        font-size: 10px;
      }

      .name {
        margin: 0 0 6px;
        font-size: 15px;
        line-height: 1.35;
      }

      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.7;
      }

      .price {
        margin-top: 8px;
        color: var(--gold);
        font-size: 16px;
      }

      .state {
        padding: 10px 18px 32px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <header class="header">
        <div class="topline">
          <button class="icon-btn" aria-label="返回">‹</button>
          <h1>通体大理石</h1>
          <button class="icon-btn" aria-label="搜索">⌕</button>
        </div>
        <div class="summary">共 128 款商品 · 分类列表 · 默认推荐排序</div>
      </header>

      <section class="toolbar" aria-label="筛选与排序">
        <button class="tool primary">筛选</button>
        <button class="tool">默认排序</button>
        <button class="tool">只看有图</button>
      </section>

      <section class="chips" aria-label="已选筛选">
        <span class="chip">品牌：菲尚特</span>
        <span class="chip">规格：750×1500</span>
      </section>

      <section class="list" aria-label="商品列表">
        <article class="card">
          <div class="image" aria-hidden="true"></div>
          <div class="info">
            <span class="badge">热销</span>
            <h2 class="name">FST 通体大理石柔光灰</h2>
            <p class="meta">SKU FST-MG-7501500<br />菲尚特 · 750×1500mm · 客厅/餐厅</p>
            <div class="price">¥168 / 片</div>
          </div>
        </article>

        <article class="card">
          <div class="image" aria-hidden="true"></div>
          <div class="info">
            <span class="badge">新品</span>
            <h2 class="name">FST 云纹米白大板</h2>
            <p class="meta">SKU FST-YW-9001800<br />菲尚特 · 900×1800mm · 背景墙</p>
            <div class="price">¥286 / 片</div>
          </div>
        </article>

        <article class="card">
          <div class="image" aria-hidden="true"></div>
          <div class="info">
            <span class="badge">推荐</span>
            <h2 class="name">FST 雅士白柔光砖</h2>
            <p class="meta">SKU FST-YS-6001200<br />菲尚特 · 600×1200mm · 卧室/走廊</p>
            <div class="price">¥129 / 片</div>
          </div>
        </article>
      </section>

      <div class="state">上拉加载更多 · 无更多时显示统一底部状态</div>
    </main>
  </body>
</html>
