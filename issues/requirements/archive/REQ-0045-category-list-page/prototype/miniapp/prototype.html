<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>菲尚特瓷砖微信小程序 · 分类列表页 v1</title>
<style>
:root{
  --brand:#C8A055;--brand-soft:rgba(200,160,85,.14);--bg:#18160F;--panel:#211E16;
  --panel-2:#29261D;--text:#EDE8DF;--muted:rgba(237,232,223,.52);--line:rgba(255,255,255,.075);
  --font:"Source Han Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#0e0d09;color:var(--text);font-family:var(--font)}
button{font:inherit;color:inherit}
.shell{width:390px;height:844px;margin:24px auto;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.52)}
.status{height:44px;padding:12px 18px 0;display:flex;justify-content:space-between;font-size:11px;font-weight:700}
.header{height:56px;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}.brand img{width:38px;height:38px;border-radius:8px;background:#fff;object-fit:cover}
.brand-title{font-size:16px;font-weight:700;line-height:1.15}.brand-sub{font-size:11px;color:var(--muted);margin-top:3px}
.capsule{width:86px;height:32px;border:1px solid var(--line);border-radius:18px;display:flex;align-items:center;justify-content:space-evenly;background:rgba(255,255,255,.03)}
.capsule i{width:1px;height:18px;background:var(--line)}
.search-wrap{padding:8px 16px 14px;border-bottom:1px solid var(--line)}
.search{height:44px;border:1px solid var(--line);background:var(--panel);border-radius:22px;display:flex;align-items:center;padding:0 14px;color:var(--muted);font-size:13px}
.search-icon{width:19px;height:19px;border:2px solid currentColor;border-radius:50%;margin-right:10px;position:relative}.search-icon:after{content:"";position:absolute;width:7px;height:2px;background:currentColor;right:-5px;bottom:-2px;transform:rotate(45deg);border-radius:2px}
.page-title{font-size:22px;font-weight:700;padding:14px 16px 12px;display:flex;align-items:baseline;gap:8px}.page-title span{font-size:11px;font-weight:400;color:var(--muted)}
.category-layout{height:610px;display:grid;grid-template-columns:98px 1fr;border-top:1px solid var(--line)}
.primary{background:#15130E;overflow-y:auto;scrollbar-width:none;padding-bottom:110px}.primary::-webkit-scrollbar{display:none}
.primary button{width:100%;height:58px;border:0;background:transparent;color:var(--muted);font-size:13px;position:relative;cursor:pointer;padding:0 8px}
.primary button.active{background:var(--panel);color:var(--text);font-weight:700}
.primary button.active:before{content:"";position:absolute;left:0;top:17px;width:3px;height:24px;border-radius:0 3px 3px 0;background:var(--brand)}
.secondary{background:var(--panel);overflow-y:auto;scrollbar-width:none;padding:0 14px 120px}.secondary::-webkit-scrollbar{display:none}
.secondary-head{position:sticky;top:0;z-index:5;height:58px;background:linear-gradient(180deg,var(--panel) 82%,rgba(33,30,22,0));display:flex;align-items:center;justify-content:space-between}
.secondary-head h2{font-size:17px;margin:0}.secondary-head small{font-size:10px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 10px}
.cat{border:0;background:transparent;padding:0;cursor:pointer;text-align:center;min-width:0}.cat:active{transform:scale(.96);opacity:.82}
.thumb{aspect-ratio:1/1;border-radius:10px;border:1px solid var(--line);overflow:hidden;position:relative;background:#76726a;box-shadow:inset 0 0 0 1px rgba(255,255,255,.025)}
.thumb:after{content:"";position:absolute;inset:0;opacity:.52}
.t1{background:linear-gradient(145deg,#dbd7ce,#aca79e 50%,#f0ede5)}.t1:after{background:repeating-linear-gradient(155deg,transparent 0 16px,rgba(83,79,72,.38) 17px 18px,transparent 19px 34px)}
.t2{background:linear-gradient(135deg,#b8b2a7,#77736c 50%,#d7d1c5)}.t2:after{background:radial-gradient(circle at 25% 20%,rgba(255,255,255,.42),transparent 28%),linear-gradient(130deg,transparent 45%,rgba(255,255,255,.24) 46%,transparent 48%)}
.t3{background:linear-gradient(145deg,#d9c5aa,#a98662 55%,#eedfcc)}.t3:after{background:repeating-linear-gradient(90deg,transparent 0 20px,rgba(78,58,39,.18) 21px 22px)}
.t4{background:linear-gradient(135deg,#9b9388,#55514b 52%,#bdb5a9)}.t4:after{background:repeating-linear-gradient(35deg,transparent 0 13px,rgba(255,255,255,.17) 14px 15px)}
.t5{background:linear-gradient(145deg,#cbc5bb,#8b857a 55%,#ded9d0)}.t5:after{background:radial-gradient(ellipse at 20% 30%,rgba(255,255,255,.42),transparent 38%),radial-gradient(ellipse at 80% 75%,rgba(70,66,60,.28),transparent 42%)}
.t6{background:linear-gradient(135deg,#80786c,#39362f 60%,#9f9688)}.t6:after{background:repeating-linear-gradient(160deg,transparent 0 22px,rgba(230,222,210,.25) 23px 24px)}
.t7{background:linear-gradient(145deg,#d8d1c4,#b4a998 52%,#ebe4d8)}.t7:after{background:linear-gradient(110deg,transparent 35%,rgba(80,70,58,.22) 36%,transparent 39%,transparent 65%,rgba(255,255,255,.3) 66%,transparent 68%)}
.t8{background:linear-gradient(135deg,#8c867d,#605b53 58%,#a6a095)}.t8:after{background:repeating-linear-gradient(0deg,transparent 0 12px,rgba(255,255,255,.1) 13px 14px)}
.t9{background:linear-gradient(135deg,#e2ded6,#bbb5aa 48%,#f4f0e8)}.t9:after{background:radial-gradient(circle at 22% 28%,rgba(120,116,108,.25),transparent 5%),radial-gradient(circle at 68% 58%,rgba(120,116,108,.2),transparent 4%)}
.cat-name{font-size:11px;line-height:1.3;margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.empty{display:none;text-align:center;padding-top:120px;color:var(--muted);font-size:12px}.empty-icon{width:72px;height:72px;margin:0 auto 16px;border:1px dashed rgba(200,160,85,.38);border-radius:50%;display:grid;place-items:center;color:var(--brand);font-size:28px}
.tabbar{position:absolute;left:0;right:0;bottom:0;height:84px;padding:10px 16px 20px;background:rgba(24,22,15,.98);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:30;backdrop-filter:blur(14px)}
.tab{text-align:center;color:var(--muted);font-size:11px}.tab b{display:block;height:27px;font-size:21px;line-height:25px;font-weight:400}.tab.active{color:var(--brand);font-weight:600}
.toast{position:absolute;left:50%;bottom:104px;transform:translate(-50%,10px);opacity:0;background:var(--text);color:var(--bg);padding:9px 14px;border-radius:20px;font-size:11px;z-index:40;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:430px){.shell{margin:0 auto;width:100vw;height:100vh}}
</style>
</head>
<body>
<main class="shell">
  <div class="status"><span>9:41</span><span>▮▮▮  ◉  ▰</span></div>
  <header class="header">
    <div class="brand"><img src="assets/logo.png" alt="菲尚特瓷砖馆 Logo"><div><div class="brand-title">菲尚特瓷砖馆</div><div class="brand-sub">专业选砖 · 品质生活</div></div></div>
    <div class="capsule"><span>•••</span><i></i><span>◉</span></div>
  </header>
  <div class="search-wrap"><div class="search" id="search"><span class="search-icon"></span><span>搜索瓷砖名称 / 型号 / 规格</span></div></div>
  <div class="page-title">分类 <span>按品类快速选砖</span></div>
  <section class="category-layout">
    <nav class="primary" id="primary">
      <button class="active" data-key="floor">地面砖</button>
      <button data-key="wall">墙面砖</button>
      <button data-key="slab">岩板</button>
      <button data-key="wood">木纹砖</button>
      <button data-key="antique">仿古砖</button>
      <button data-key="marble">大理石砖</button>
      <button data-key="micro">微水泥砖</button>
      <button data-key="mosaic">马赛克</button>
      <button data-key="outdoor">户外砖</button>
      <button data-key="special">特色工艺砖</button>
      <button data-key="accessory">配套辅材</button>
    </nav>
    <div class="secondary" id="secondary">
      <div class="secondary-head"><h2 id="secondaryTitle">地面砖</h2><small>点击分类查看商品</small></div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty"><div class="empty-icon">◇</div><p>该分类暂未配置二级分类</p></div>
    </div>
  </section>
  <nav class="tabbar">
    <div class="tab"><b>⌂</b>首页</div>
    <div class="tab active"><b>▦</b>分类</div>
    <div class="tab"><b>⌕</b>找砖</div>
    <div class="tab"><b>♡</b>收藏</div>
    <div class="tab"><b>♢</b>证书</div>
  </nav>
  <div class="toast" id="toast">进入商品列表</div>
</main>
<script>
const data={
 floor:['通体大理石','柔光砖','亮光砖','瓷抛砖','金刚釉','大板瓷砖','防滑砖','负离子瓷砖','素色砖'],
 wall:['厨卫墙砖','艺术花片','纯色墙砖','小规格墙砖','背景墙砖','质感墙砖'],
 slab:['家居岩板','超薄岩板','台面岩板','背景墙岩板','通体岩板','连纹岩板'],
 wood:['原木纹','深色木纹','鱼骨拼','人字拼','户外木纹','哑光木纹'],
 antique:['现代仿古','水泥质感','复古花砖','侘寂系列','工业风','做旧砖'],
 marble:['卡拉拉白','鱼肚白','云多拉灰','劳伦特黑','雪花白','爵士白'],
 micro:['暖灰微水泥','浅灰微水泥','米色微水泥','深灰微水泥','砂岩质感','清水混凝土'],
 mosaic:['陶瓷马赛克','玻璃马赛克','石材马赛克','金属马赛克','泳池马赛克'],
 outdoor:['庭院砖','广场砖','泳池砖','生态石','厚砖'],
 special:['手工砖','金属釉','结晶釉','窑变砖','肌理砖','浮雕砖'],
 accessory:['美缝剂','瓷砖胶','找平器','收边条','防水材料']
};
const titleMap={floor:'地面砖',wall:'墙面砖',slab:'岩板',wood:'木纹砖',antique:'仿古砖',marble:'大理石砖',micro:'微水泥砖',mosaic:'马赛克',outdoor:'户外砖',special:'特色工艺砖',accessory:'配套辅材'};
const grid=document.getElementById('grid'),title=document.getElementById('secondaryTitle'),toast=document.getElementById('toast'),secondary=document.getElementById('secondary');
function showToast(text){toast.textContent=text;toast.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>toast.classList.remove('show'),1100)}
function render(key){title.textContent=titleMap[key];secondary.scrollTop=0;grid.innerHTML=(data[key]||[]).map((name,i)=>`<button class="cat" data-name="${name}"><div class="thumb t${i%9+1}"></div><div class="cat-name">${name}</div></button>`).join('');grid.querySelectorAll('.cat').forEach(btn=>btn.onclick=()=>showToast('进入「'+btn.dataset.name+'」商品列表'))}
render('floor');
document.querySelectorAll('.primary button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelector('.primary button.active').classList.remove('active');btn.classList.add('active');render(btn.dataset.key)}));
document.getElementById('search').onclick=()=>showToast('进入全局搜索页');document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>showToast('切换至对应频道'));
</script>
</body>
</html>
