<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>REQ-0032 Clipboard 复制交互原型</title>
    <style>
      :root {
        color-scheme: dark;
        --page: #18160f;
        --surface: #211e16;
        --surface-2: #28241a;
        --text: #ede8df;
        --muted: rgba(237, 232, 223, 0.62);
        --subtle: rgba(237, 232, 223, 0.38);
        --border: rgba(255, 255, 255, 0.1);
        --gold: #c8a055;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 32px 0;
      }

      h1,
      h2 {
        margin: 0;
        font-weight: 500;
        letter-spacing: 0;
      }

      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 16px;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.8;
      }

      .stack {
        display: grid;
        gap: 20px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: 3px;
        background: var(--surface);
      }

      .panel-head,
      .panel-row,
      .modal-head,
      .modal-body,
      .modal-footer {
        padding: 16px;
      }

      .panel-head,
      .modal-head {
        border-bottom: 1px solid var(--border);
      }

      .table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }

      th {
        color: var(--subtle);
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
      }

      button {
        min-height: 32px;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        padding: 0 12px;
      }

      button.primary {
        border-color: var(--gold);
        background: var(--gold);
        color: #18160f;
      }

      .toast {
        position: fixed;
        right: 24px;
        top: 24px;
        z-index: 10;
        max-width: 360px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: var(--surface-2);
        padding: 12px 14px;
        color: var(--text);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }

      .modal-backdrop {
        display: grid;
        min-height: 300px;
        place-items: center;
        border-top: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.16);
      }

      .password-modal-card {
        width: min(520px, calc(100% - 32px));
        border: 1px solid var(--border);
        border-radius: 3px;
        background: var(--surface);
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: var(--page);
        color: var(--text);
        font: inherit;
        padding: 10px 12px;
      }

      .status {
        margin-top: 10px;
        color: var(--muted);
      }

      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main class="stack">
      <header class="stack">
        <h1>Clipboard 复制交互</h1>
        <p>共享 helper 返回结构化结果；调用方保留业务文案、toast、弹窗状态和埋点。</p>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h2>日志审计列表行内复制</h2>
          <p>复制成功后显示 fixed toast，不推挤列表布局。</p>
        </div>
        <table class="table" aria-label="日志审计复制示例">
          <thead>
            <tr>
              <th>请求</th>
              <th>request_id</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>GET /api/v1/admin/logs</td>
              <td>req_1234567890abcdef</td>
              <td><button type="button">复制 request_id</button></td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>重置密码弹窗复制</h2>
          <p>自动复制失败时聚焦并选中输入框，提示用户手动复制。</p>
        </div>
        <div class="modal-backdrop">
          <div class="password-modal-card" role="dialog" aria-modal="true" aria-labelledby="reset-title">
            <div class="modal-head">
              <h2 id="reset-title">随机密码已生成</h2>
            </div>
            <div class="modal-body">
              <p>请复制并安全交付给用户，关闭后不可再次查看。</p>
              <input aria-label="随机密码" readonly value="InitialPass123!" />
              <p class="status" role="status">自动复制失败，请使用 Command/Ctrl + C 手动复制已选中的密码。</p>
            </div>
            <div class="modal-footer">
              <button type="button">复制密码</button>
              <button type="button" class="primary">关闭</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" role="status">request_id 已复制</div>
  </body>
</html>
