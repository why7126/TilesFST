<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>商品卡片组件原型</title>
<style>
body{background:#0e0d09;color:#EDE8DF;font-family:PingFang SC;padding:30px}
.phone{width:390px;background:#18160F;padding:20px;border-radius:24px}
.card{background:#211E16;border-radius:16px;padding:12px;width:160px}
.img{height:160px;background:#302b20;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#999}
.title{font-size:16px;margin-top:12px}
.tag{display:inline-block;background:#332d20;color:#C8A055;padding:3px 8px;border-radius:10px;font-size:11px;margin-top:8px}
.price{color:#C8A055;font-size:14px;margin-top:10px}
.grid{display:flex;gap:14px}
</style>
</head>
<body>
<div class="phone">
<h2>全部产品</h2>
<div class="grid">
<div class="card">
<div class="img">瓷砖图片</div>
<div class="title">800×800柔光砖 星空灰</div>
<div><span class="tag">800×800</span><span class="tag">柔光</span></div>
<div class="price">¥89/片</div>
</div>
<div class="card">
<div class="img">瓷砖图片</div>
<div class="title">750×1500岩板系列</div>
<div><span class="tag">岩板</span></div>
<div class="price">¥129/片</div>
</div>
</div>
</div>
</body>
</html>
