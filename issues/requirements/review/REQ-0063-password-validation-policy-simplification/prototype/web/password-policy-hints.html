<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REQ-0063 Password Policy Hints</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #18160f;
      --surface: #211e16;
      --border: rgba(255, 255, 255, 0.12);
      --border-focus: #c8a055;
      --text: #ede8df;
      --muted: rgba(237, 232, 223, 0.58);
      --danger: #d96c5f;
      --success: #8fbf7a;
      --gold: #c8a055;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--page);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .modal {
      width: min(520px, calc(100vw - 32px));
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    .header,
    .footer {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .footer {
      border-top: 1px solid var(--border);
      border-bottom: 0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .body {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 500;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    input {
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.18);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--border-focus);
    }

    .rules {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    .rules .ok {
      color: var(--success);
    }

    .rules .error {
      color: var(--danger);
    }

    button {
      height: 40px;
      border-radius: 2px;
      padding: 0 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    .primary {
      border-color: var(--gold);
      background: var(--gold);
      color: #18160f;
    }
  </style>
</head>
<body>
  <section class="modal" role="dialog" aria-labelledby="title">
    <div class="header">
      <h1 id="title">修改密码</h1>
    </div>
    <div class="body">
      <label>
        当前密码
        <input type="password" placeholder="请输入当前登录密码" />
      </label>
      <label>
        新密码
        <input type="password" value="abc1" aria-describedby="password-rules" />
      </label>
      <ul id="password-rules" class="rules">
        <li class="error">密码至少需要 5 位</li>
        <li class="ok">密码需包含英文字符</li>
        <li class="ok">密码需包含数字</li>
        <li>密码至多 32 位</li>
      </ul>
      <label>
        确认新密码
        <input type="password" placeholder="请再次输入新密码" />
      </label>
    </div>
    <div class="footer">
      <button type="button">取消</button>
      <button class="primary" type="button">保存修改</button>
    </div>
  </section>
</body>
</html>
