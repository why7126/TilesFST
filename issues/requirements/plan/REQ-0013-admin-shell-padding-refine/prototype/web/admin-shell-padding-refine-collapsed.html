<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>TILESFST — Shell padding collapsed（REQ-0013）</title>
  <style>
    :root {
      --page: #18160f;
      --deep: #100f0a;
      --text: #ede8df;
      --muted: rgb(237 232 223 / 0.5);
      --gold: #c8a055;
      --gold-bg: rgb(200 160 85 / 0.12);
      --line: rgb(255 255 255 / 0.07);
      --line-strong: rgb(255 255 255 / 0.1);
      --sidebar-width: 72px;
      --admin-content-max-width: min(1400px, 100%);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--page);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 12px;
    }
    .note {
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--line);
      background: rgb(200 160 85 / 0.08);
      color: rgb(237 232 223 / 0.5);
    }
    .note a { color: #c8a055; }
    .admin-shell {
      min-height: calc(100vh - 52px);
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      background: linear-gradient(135deg, var(--page), var(--deep));
    }
    .sidebar {
      padding: 12px 6px 14px;
      border-right: 0.5px solid var(--line);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 3px;
      border: 0.5px solid rgb(200 160 85 / 0.32);
      background: var(--gold-bg);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .sidebar-toggle {
      width: 28px;
      height: 28px;
      border: 0.5px solid var(--line-strong);
      border-radius: 2px;
      background: rgb(255 255 255 / 0.03);
      color: var(--muted);
      font-size: 16px;
    }
    .nav-item {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      margin-bottom: 4px;
    }
    .nav-item.active { background: var(--gold-bg); color: var(--gold); }
    .nav-icon {
      width: 16px;
      height: 16px;
      border: 0.5px solid currentColor;
      border-radius: 2px;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 3px;
      background: var(--gold-bg);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: auto;
    }
    .main-content { padding: 32px 32px 72px; }
    .content-inner {
      max-width: var(--admin-content-max-width);
      margin: 0 auto;
      border: 0.5px solid var(--line);
      border-radius: 3px;
      padding: 16px;
      min-height: 360px;
      background: rgb(33 30 22 / 0.5);
    }
    h1 { margin: 0; font-size: 22px; font-weight: 400; }
    p { color: var(--muted); line-height: 1.7; }
  </style>
</head>
<body>
  <div class="note">
    REQ-0013 — <strong>collapsed 72px</strong> · sidebar <code>12px 6px 14px</code> · 主内容更宽（1920 SKU 验收帧）。
    <a href="admin-shell-padding-refine-expanded.html">expanded</a>
  </div>
  <div class="admin-shell" data-sidebar-state="collapsed">
    <aside class="sidebar">
      <span class="brand-mark">TF</span>
      <button type="button" class="sidebar-toggle" aria-label="展开侧边栏">›</button>
      <div class="nav-item active"><span class="nav-icon"></span></div>
      <div class="nav-item"><span class="nav-icon"></span></div>
      <div class="nav-item"><span class="nav-icon"></span></div>
      <span class="avatar">AU</span>
    </aside>
    <main class="main-content">
      <div class="content-inner">
        <h1>瓷砖 SKU</h1>
        <p>collapsed 态：列宽 72px 不变；padding 6px 壳层；content-inner 仍 min(1400px, 100%)。无 nav-scroll 横向溢出。</p>
      </div>
    </main>
  </div>
</body>
</html>
