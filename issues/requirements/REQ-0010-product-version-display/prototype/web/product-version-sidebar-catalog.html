<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REQ-0010 — 店主端侧边栏版本展示</title>
  <style>
    :root {
      --page: #18160f;
      --text: #ede8df;
      --muted: rgba(237, 232, 223, 0.5);
      --weak: rgba(237, 232, 223, 0.3);
      --gold: #c8a055;
      --line: rgba(255, 255, 255, 0.07);
      --line-strong: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 200px;
      shrink: 0;
      border-right: 0.5px solid var(--line);
      padding: 24px 20px;
      background: var(--page);
    }
    .brand-head {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 0.5px solid var(--line);
    }
    .product-name {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
    }
    .product-name em {
      font-style: normal;
      color: var(--gold);
    }
    .version-pill {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 7px;
      border-radius: 2px;
      border: 0.5px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.04em;
    }
    .filter-title {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--weak);
      margin: 0 0 12px;
    }
    .filter-item {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .content {
      flex: 1;
      padding: 32px 28px;
    }
    .note {
      max-width: 560px;
      padding: 16px;
      border: 0.5px solid var(--line);
      border-radius: 3px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }
    .note strong { color: var(--gold); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" aria-label="筛选侧栏">
      <div class="brand-head" aria-label="产品版本 v0.0.1">
        <span class="product-name">ST<em>ONE</em>X</span>
        <span class="version-pill">v0.0.1</span>
      </div>
      <p class="filter-title">材质</p>
      <div class="filter-item">☑ 大理石</div>
      <div class="filter-item">☐ 岩板</div>
      <div class="filter-item">☐ 水泥砖</div>
      <p class="filter-title" style="margin-top: 20px">规格</p>
      <div class="filter-item">☐ 600×1200</div>
      <div class="filter-item">☐ 750×1500</div>
    </aside>
    <main class="content">
      <div class="note">
        <strong>REQ-0010 店主端原型</strong><br />
        筛选侧栏最上方：品牌名 + 版本 pill（与管理端同一 <code>PRODUCT_VERSION</code>）。
        版本 MUST 在侧栏内，不可仅在顶栏 SiteNav 展示。
      </div>
    </main>
  </div>
</body>
</html>
