# 生产 Docker Compose 编排：外部 MySQL + 外部 MinIO/S3 兼容或云上对象存储。
# 维护要求：新增或修改 service、environment、ports、networks 时，必须同步补充注释并更新 .env.example / docs/02-deployment.md。
services:
  # 生产后端服务，结构化数据写入外部 MySQL，媒体对象写入外部对象存储。
  backend:
    # 生产镜像名由 .env 控制；保留 build 时会将源码构建结果打为该 tag。
    image: ${TILESFST_BACKEND_IMAGE:-tilesfst-backend:v0.0.4}
    # 后端镜像构建上下文限定在 src/backend。
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    # 后端固定容器名，便于部署脚本与日志检索；与其他 Compose 变体保持一致。
    container_name: tilesfst-backend
    # 生产环境变量显式列出；带 :? 的变量缺失时 Compose 会快速失败。
    environment:
      # 生产模式开关；后端会据此启用生产数据库校验。
      APP_ENV: production
      # 生产关闭调试，避免泄露错误栈与敏感上下文。
      APP_DEBUG: "false"
      # 应用签名密钥，必须由生产 .env 或密钥系统提供。
      APP_SECRET_KEY: ${APP_SECRET_KEY:?Set APP_SECRET_KEY in production .env}
      # JWT 普通登录访问令牌有效期，单位分钟。
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      # JWT 勾选「记住我」时的访问令牌有效期，单位天。
      JWT_REMEMBER_ME_EXPIRE_DAYS: ${JWT_REMEMBER_ME_EXPIRE_DAYS:-7}
      # 生产结构化数据必须写入外部 MySQL。
      DATABASE_URL: ${DATABASE_URL:?Set production MySQL DATABASE_URL}
      # 容器内监听全部网卡，供 Compose 网络和端口映射访问。
      BACKEND_HOST: 0.0.0.0
      # 容器内 FastAPI 固定端口；宿主机端口在 ports 中映射。
      BACKEND_PORT: 8000
      # 默认管理员用户名；仅首次建库或受控重置时使用。
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      # 默认管理员初始密码；生产必须显式提供非示例值。
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?Set ADMIN_INITIAL_PASSWORD for first startup}
      # 是否启动时重置默认管理员密码；生产默认 false。
      ADMIN_RESET_PASSWORD_ON_STARTUP: ${ADMIN_RESET_PASSWORD_ON_STARTUP:-false}
      # 对象存储提供方；COS/TOS 等云上服务使用 S3 兼容协议接入。
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-s3-compatible}
      # 对象存储 S3 兼容 endpoint。
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:?Set external object storage endpoint, for example cos.example.com}
      # 对象存储访问密钥；生产必须由密钥系统或 .env 注入。
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:?Set external object storage access key}
      # 对象存储秘密密钥；不得写入 Compose 或文档明文。
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:?Set external object storage secret key}
      # 对象存储通常启用 HTTPS；仅内网明文测试可设为 false。
      OBJECT_STORAGE_SECURE: ${OBJECT_STORAGE_SECURE:-true}
      # 外部对象存储 bucket 必须提前创建，仍遵守一个项目一个 Bucket。
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?Set existing external object storage bucket}
      # COS/TOS 等云厂商通常需要 region；外部 MinIO 可留空。
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-}
      # 访问风格开关；MinIO 通常 true，云厂商 virtual-host 风格可设为 false。
      OBJECT_STORAGE_PATH_STYLE: ${OBJECT_STORAGE_PATH_STYLE:-false}
      # 外部云上对象存储默认不由应用自动创建 bucket。
      OBJECT_STORAGE_AUTO_CREATE_BUCKET: ${OBJECT_STORAGE_AUTO_CREATE_BUCKET:-false}
      # 图片对象前缀。
      OBJECT_STORAGE_PREFIX_IMAGES: ${OBJECT_STORAGE_PREFIX_IMAGES:-images/}
      # 旧版原始对象前缀，仅兼容存量对象。
      OBJECT_STORAGE_PREFIX_ORIGINAL: ${OBJECT_STORAGE_PREFIX_ORIGINAL:-original/}
      # 文档对象前缀（预留）。
      OBJECT_STORAGE_PREFIX_FILES: ${OBJECT_STORAGE_PREFIX_FILES:-files/}
      # 音频对象前缀（预留）。
      OBJECT_STORAGE_PREFIX_AUDIOS: ${OBJECT_STORAGE_PREFIX_AUDIOS:-audios/}
      # 缩略图对象前缀。
      OBJECT_STORAGE_PREFIX_THUMBNAILS: ${OBJECT_STORAGE_PREFIX_THUMBNAILS:-thumbnails/}
      # 处理产物对象前缀。
      OBJECT_STORAGE_PREFIX_PROCESSED: ${OBJECT_STORAGE_PREFIX_PROCESSED:-processed/}
      # 临时对象前缀。
      OBJECT_STORAGE_PREFIX_TEMP: ${OBJECT_STORAGE_PREFIX_TEMP:-tmp/}
      # 视频原文件对象前缀。
      OBJECT_STORAGE_PREFIX_VIDEO: ${OBJECT_STORAGE_PREFIX_VIDEO:-videos/}
      # 视频封面对象前缀。
      OBJECT_STORAGE_PREFIX_VIDEO_COVER: ${OBJECT_STORAGE_PREFIX_VIDEO_COVER:-videos/covers/}
      # 视频转码产物对象前缀。
      OBJECT_STORAGE_PREFIX_VIDEO_TRANSCODED: ${OBJECT_STORAGE_PREFIX_VIDEO_TRANSCODED:-videos/transcoded/}
      # 图片上传大小上限（MB），须与 Web Nginx body 限制协调。
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-20}
      # 视频上传大小上限（MB），须与 Web Nginx body 限制协调。
      MAX_VIDEO_SIZE_MB: ${MAX_VIDEO_SIZE_MB:-500}
      # 文档 / 证书文件上传大小上限（MB），须与 Web Nginx body 限制协调。
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
      # 允许上传的图片 MIME 类型。
      ALLOWED_IMAGE_TYPES: ${ALLOWED_IMAGE_TYPES:-image/jpeg,image/jpg,image/png,image/webp,image/gif,image/svg+xml,image/bmp,image/tiff,image/heic}
      # 允许上传的视频 MIME 类型。
      ALLOWED_VIDEO_TYPES: ${ALLOWED_VIDEO_TYPES:-video/mp4,video/quicktime,video/x-msvideo,video/webm,video/x-matroska,video/mpeg,video/3gpp}
    # 宿主机端口可通过 HOST_PORT_BACKEND 覆盖；容器内端口固定 8000。
    ports:
      - "${HOST_PORT_BACKEND:-8000}:8000"
    # 生产不挂载 SQLite；仅保留处理产物与临时目录。
    volumes:
      - ./data/processed:/app/data/processed
      - ./data/tmp:/app/data/tmp
    networks:
      - tilesfst

  # 生产 Web 容器，托管已构建静态资源并反代后端 API。
  web:
    # Web 生产镜像名由 .env 控制；保留 build 时会将源码构建结果打为该 tag。
    image: ${TILESFST_WEB_IMAGE:-tilesfst-web:v0.0.4}
    # Web 构建需要项目根上下文，以便复制共享设计系统与业务类型。
    build:
      context: .
      dockerfile: src/web/Dockerfile
    container_name: tilesfst-web
    # 宿主机端口可通过 HOST_PORT_WEB 覆盖；容器内 Nginx 固定 80。
    ports:
      - "${HOST_PORT_WEB:-3000}:80"
    # Web 依赖 backend 服务用于 API 反代。
    depends_on:
      - backend
    networks:
      - tilesfst

networks:
  # 外部服务型生产 Compose 内部 bridge 网络，仅包含 backend 与 web。
  tilesfst:
    driver: bridge
